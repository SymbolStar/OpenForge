<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OpenForge · Multi-Agent Topic Tracker</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<div id="app">
  <aside id="squad-rail">
    <div class="brand">
      <div class="brand-title">OpenForge <span>🔨</span></div>
      <button id="btn-settings" class="brand-settings-btn" type="button" title="设置" aria-label="设置">⚙</button>
    </div>
    <div class="rail-section">
      <div class="section-label">
        SQUADS
        <button id="toggle-archived" type="button" class="section-label-toggle" title="显示已归档">☐ 归档</button>
      </div>
      <ul id="squad-list"></ul>
      <button id="btn-new-squad" class="new-squad-btn" type="button">+ New Squad</button>
    </div>
    <div class="footer-help">
      <span id="status-dot" class="dot dot-ok"></span>
      <span id="status-text">就绪</span>
    </div>
  </aside>

  <div class="col-gutter" data-gutter="squad" title="拖动调整宽度"></div>

  <aside id="thread-rail">
    <header class="rail-header">
      <div class="rail-header-text">
        <h1 id="squad-title">—</h1>
        <p id="squad-description"></p>
      </div>
      <button id="btn-edit-squad" class="icon-btn" type="button" title="编辑 squad" hidden>✎</button>
    </header>
    <div class="rail-list-head">
      <span>THREADS</span>
      <button id="btn-refresh-threads" type="button" title="刷新">↻</button>
    </div>
    <ul id="thread-list"></ul>
    <footer id="thread-composer">
      <textarea id="thread-composer-input"
                rows="1"
                placeholder="开始一个新 thread… (Enter 发送 · Shift+Enter 换行)"></textarea>
      <div class="composer-hint">
        <span>每条 thread 是一个话题</span>
        <span id="thread-composer-count" class="composer-count">0</span>
      </div>
    </footer>
  </aside>

  <div class="col-gutter" data-gutter="thread" title="拖动调整宽度"></div>

  <main id="thread-pane">
    <header id="thread-header">
      <div class="thread-header-main">
        <h2 id="detail-title">选择一个 thread</h2>
        <div id="detail-sub" class="meta"></div>
      </div>
      <div id="detail-participants" class="avatar-stack"></div>
      <span id="detail-status" class="status-chip">idle</span>
      <button id="btn-close-thread" class="ghost-btn" type="button" title="关闭 thread" disabled>Close</button>
      <button id="btn-refresh-detail" type="button" title="刷新" class="ghost-btn">↻</button>
    </header>
    <div id="post-list"></div>
    <footer id="post-composer">
      <div id="composer-reply-banner">
        <span class="reply-target"></span>
        <button type="button" id="btn-cancel-reply" title="取消回复">×</button>
      </div>
      <textarea id="post-composer-input"
                rows="1"
                placeholder="发一条消息… (Enter 发送 · Shift+Enter 换行 · @ 可提到 agent)"
                disabled></textarea>
      <button id="btn-send-post" type="button" disabled>发送</button>
    </footer>
  </main>
</div>

<div id="squad-modal" class="modal-backdrop" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <h2 id="modal-title">New Squad</h2>
      <button id="btn-close-modal" type="button" title="Close">×</button>
    </div>
    <form id="squad-form">
      <label>ID<input name="id" required maxlength="32" pattern="\w{1,32}" placeholder="frontend" /></label>
      <label>Name<input name="name" required placeholder="Frontend Team" /></label>
      <label>Description<textarea name="description" rows="3" placeholder="Focus, scope, or rituals"></textarea></label>
      <label>Emoji<input name="emoji" maxlength="8" placeholder="✨" /></label>
      <fieldset>
        <legend>Members</legend>
        <div id="member-checkboxes" class="checkbox-grid"></div>
      </fieldset>
      <label>Chair<select name="chair" id="chair-select"></select></label>
      <label class="squad-archive-row" id="squad-archive-row" hidden>
        <input type="checkbox" name="archived" id="squad-archived-cb" />
        <span><strong>归档这个 squad</strong><small>从侧栏隐藏，不删除数据；在右上“显示已归档”中仍可恢复</small></span>
      </label>
      <div class="modal-actions">
        <button type="button" id="btn-delete-squad" class="btn-danger" hidden>删除 squad</button>
        <span class="flex-spacer"></span>
        <button type="button" id="btn-cancel-modal">Cancel</button>
        <button type="submit" id="btn-submit-squad">Create</button>
      </div>
    </form>
  </div>
</div>

<div id="settings-modal" class="modal-backdrop" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="modal-header">
      <h2 id="settings-title">设置</h2>
      <button id="btn-close-settings" type="button" title="Close">×</button>
    </div>
    <form id="settings-form">
      <fieldset>
        <legend>Features</legend>
        <label class="setting-row">
          <input type="checkbox" name="replyNesting" />
          <span>
            <strong>嵌套回复</strong>
            <small>每条 post hover 出现 ↩ Reply，发送后嵌套渲染</small>
          </span>
        </label>
      </fieldset>
      <div class="modal-actions">
        <span class="flex-spacer"></span>
        <button type="button" id="btn-close-settings-2">关闭</button>
      </div>
    </form>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
