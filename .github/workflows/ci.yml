name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs when a new push lands on the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - run: pip install ruff
      - run: ruff check .

  shellcheck:
    name: shellcheck bin/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          additional_files: "bin/forge tests/fixtures/fake_openclaw.sh"
          scandir: "./bin"

  test:
    name: pytest · py${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python }}" }
      - run: pip install pytest coverage
      - run: chmod +x tests/fixtures/fake_openclaw.sh
      - name: pytest (with coverage on 3.13)
        env:
          COVERAGE_PROCESS_START: ${{ github.workspace }}/.coveragerc
        run: |
          if [ "${{ matrix.python }}" = "3.13" ]; then
            coverage run --rcfile=.coveragerc -m pytest tests/ -v
            coverage combine --rcfile=.coveragerc
            coverage report --rcfile=.coveragerc --fail-under=80
            coverage xml --rcfile=.coveragerc -o coverage.xml || true
          else
            python -m pytest tests/ -v
          fi
      - name: Upload coverage artifact
        if: matrix.python == '3.13' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            .coverage
          if-no-files-found: ignore

  smoke:
    name: server boot smoke
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - name: Boot server in background and curl every endpoint
        run: |
          python -u server.py --port 17878 > /tmp/server.log 2>&1 &
          SERVER_PID=$!

          # wait up to 5s for the port
          for i in $(seq 1 50); do
            curl -sf http://127.0.0.1:17878/api/squads >/dev/null && break
            sleep 0.1
          done

          # create squad
          curl -sf -X POST -H "Content-Type: application/json" \
            -d '{"id":"smoke","name":"smoke","members":["milk"],"chair":"milk"}' \
            http://127.0.0.1:17878/api/squads | tee /tmp/squad.json

          # create thread (no @ so router stays out of the smoke path; CI has no openclaw)
          TID=$(curl -sf -X POST -H "Content-Type: application/json" \
            -d '{"content":"kick off without ats","created_by":"scott"}' \
            http://127.0.0.1:17878/api/squads/smoke/threads | python -c 'import json,sys;print(json.load(sys.stdin)["thread_id"])')
          echo "tid=$TID"

          # add post
          curl -sf -X POST -H "Content-Type: application/json" \
            -d '{"content":"follow up","speaker":"scott"}' \
            http://127.0.0.1:17878/api/threads/$TID/posts >/dev/null

          # detail
          curl -sf http://127.0.0.1:17878/api/threads/$TID | python -c 'import json,sys; d=json.load(sys.stdin); assert d["post_count"]==2, d; print("OK", d["post_count"], "posts")'

          # v0.6 files API smoke (no @ content; router stays out)
          curl -sf http://127.0.0.1:17878/api/files | python -c 'import json,sys; d=json.load(sys.stdin); assert d.get("files")==[], d; print("files-empty OK")'
          curl -sf -X POST -H "Content-Type: application/json" \
            -d '{"name":"smoke.md","content":"# smoke\n"}' \
            http://127.0.0.1:17878/api/files | python -c 'import json,sys; d=json.load(sys.stdin); assert d["name"]=="smoke.md" and d["size"]==len(b"# smoke\n"), d; print("files-create OK")'
          curl -sf http://127.0.0.1:17878/api/files | python -c 'import json,sys; d=json.load(sys.stdin); assert [f["name"] for f in d["files"]]==["smoke.md"], d; print("files-list OK")'
          curl -sf -X PUT -H "Content-Type: application/json" \
            -d '{"content":"updated body"}' \
            http://127.0.0.1:17878/api/files/smoke.md | python -c 'import json,sys; d=json.load(sys.stdin); assert d["size"]==len(b"updated body"), d; print("files-put OK")'
          curl -sf http://127.0.0.1:17878/api/files/smoke.md | python -c 'import json,sys; d=json.load(sys.stdin); assert d["content"]=="updated body", d; print("files-read OK")'
          # negative cases
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:17878/api/files/missing.md)" = "404" && echo "files-404 OK"
          test "$(curl -s -o /dev/null -w '%{http_code}' -X POST -H 'Content-Type: application/json' -d '{"name":"../etc/passwd"}' http://127.0.0.1:17878/api/files)" = "400" && echo "files-400 OK"
          test "$(curl -s -o /dev/null -w '%{http_code}' -X POST -H 'Content-Type: application/json' -d '{"name":"smoke.md"}' http://127.0.0.1:17878/api/files)" = "409" && echo "files-409 OK"

          # v0.7 multi-root: list-roots and v0.6 deprecation header
          curl -sf http://127.0.0.1:17878/api/file-roots | python -c 'import json,sys; d=json.load(sys.stdin); assert any(r["id"]=="files" for r in d["roots"]), d; print("file-roots OK")'
          curl -sI http://127.0.0.1:17878/api/files/smoke.md | tr -d '\r' | grep -i '^Deprecation:' && echo "v0.6-deprecation-header OK"
          curl -sf http://127.0.0.1:17878/api/files/files/smoke.md | python -c 'import json,sys; d=json.load(sys.stdin); assert d["root"]=="files" and d["content"]=="updated body", d; print("multi-root-read OK")'

          # v0.7 multi-root with a configured docs root (read-only)
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          mkdir -p "$HOME/.openclaw/openforge" /tmp/docs-root
          echo '# doc' > /tmp/docs-root/seed.md
          python -c "import json,os; json.dump({'fileRoots':[{'id':'files','label':'Files','path':os.path.expanduser('~/.openclaw/openforge/files'),'writable':True},{'id':'docs','label':'Docs','path':'/tmp/docs-root','writable':False}]}, open(os.path.expanduser('~/.openclaw/openforge/config.json'),'w'))"
          python -u server.py --port 17878 > /tmp/server2.log 2>&1 &
          SERVER_PID=$!
          for i in $(seq 1 50); do
            curl -sf http://127.0.0.1:17878/api/file-roots >/dev/null && break
            sleep 0.1
          done
          curl -sf http://127.0.0.1:17878/api/file-roots | python -c 'import json,sys; d=json.load(sys.stdin); ids=[r["id"] for r in d["roots"]]; assert "docs" in ids, d; ro=[r for r in d["roots"] if r["id"]=="docs"][0]; assert ro["writable"] is False, ro; assert ro["count"]==1, ro; print("docs-root listed OK")'
          curl -sf http://127.0.0.1:17878/api/files/docs/seed.md | python -c 'import json,sys; d=json.load(sys.stdin); assert d["content"]=="# doc\n", d; print("docs-root read OK")'
          # write to read-only → 403
          test "$(curl -s -o /dev/null -w '%{http_code}' -X POST -H 'Content-Type: application/json' -d '{"name":"new.md","content":"x"}' http://127.0.0.1:17878/api/files/docs)" = "403" && echo "docs-readonly POST=403 OK"
          test "$(curl -s -o /dev/null -w '%{http_code}' -X PUT -H 'Content-Type: application/json' -d '{"content":"x"}' http://127.0.0.1:17878/api/files/docs/seed.md)" = "403" && echo "docs-readonly PUT=403 OK"

          kill $SERVER_PID 2>/dev/null || true
          cat /tmp/server.log
          echo "--- server2 ---"
          cat /tmp/server2.log
