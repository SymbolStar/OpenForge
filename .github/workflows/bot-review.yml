name: bot-review

# Phase 2: review-comment + auto-approve + auto-merge when clean.
#
# Job 1 (review) — always runs:
#   - posts sticky red-line review comment (diff, A-7.5, SSE, forge race)
#   - emits outputs: has_findings, has_needs_human, is_internal
#
# Job 2 (auto-approve) — runs only when ALL of:
#   - PR author is an internal SymbolStar member (no fork PRs)
#   - PR is not draft
#   - PR has no `no-auto-merge` label
#   - red-line checks produced zero ❌ findings
#   - changed paths hit zero `needs human review` entries
#   then: gh pr review --approve  +  gh pr merge --auto --squash
#   (auto-merge waits for required CI checks if branch protection is set)
#
# Escape hatches:
#   - add label `no-auto-merge` on the PR
#   - put `[no-auto-merge]` in PR title
#   - touch any `needs human` path (server.py, migrations/, bin/forge,
#     .github/workflows/, *.plist, forge_xiaof.py)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bot-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: bot-review (comment-only)
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need base ref for diff

      - name: Compute diff base
        id: base
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"
          {
            echo "files<<EOF"
            git diff --name-only "$BASE" "$HEAD"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          STATS=$(git diff --shortstat "$BASE" "$HEAD" || echo "(no diff)")
          echo "stats=$STATS" >> "$GITHUB_OUTPUT"

      - name: Check author membership (internal vs fork)
        id: membership
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          ORG: SymbolStar
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          set +e
          internal="false"
          # Fork PRs are never internal.
          if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "PR head is a fork ($HEAD_REPO) — treating as external."
          else
            # Same-repo PR: author must already have push access to have created
            # the branch, so we can safely treat them as internal. (The previous
            # `gh api orgs/{org}/members/{user}` check requires the token itself
            # to be an org member, which GITHUB_TOKEN is not — it always returned
            # 404 and falsely marked everyone external. See bot-review postmortem.)
            case "$AUTHOR" in
              dependabot\[bot\]|github-actions\[bot\]|copilot-pull-request-reviewer\[bot\]|coderabbitai\[bot\])
                internal="true" ;;
              *)
                internal="true" ;;
            esac
          fi
          echo "internal=$internal" >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR internal=$internal head_repo=$HEAD_REPO base_repo=$BASE_REPO"

      - name: Run red-line checks
        id: checks
        env:
          BASE: ${{ steps.base.outputs.base }}
          HEAD: ${{ steps.base.outputs.head }}
        run: |
          set +e  # we accumulate findings, never fail the job
          findings=""
          needs_human=""

          add_finding() { findings="${findings}- ❌ $1"$'\n'; }
          add_warn()    { findings="${findings}- ⚠️ $1"$'\n'; }
          add_ok()      { findings="${findings}- ✅ $1"$'\n'; }
          add_human()   { needs_human="${needs_human}- $1"$'\n'; }

          # --- A-7.5: 'forbidden' must never appear as an error code ---
          # Only flag NEW occurrences (in added lines) so we don't punish
          # PRs that touch but don't introduce regressions.
          added_forbidden=$(
            git diff "$BASE" "$HEAD" -- forge_xiaof.py web/xiaof.js \
              | grep -E '^\+' | grep -v '^\+\+\+' \
              | grep -iE '\bforbidden\b' || true
          )
          if [ -n "$added_forbidden" ]; then
            add_finding "A-7.5 red line: 'forbidden' added to xiaof code (must use unauth|rate_limited|upstream_failed|internal). Lines:\n\`\`\`\n$added_forbidden\n\`\`\`"
          else
            add_ok "A-7.5: no new 'forbidden' code in xiaof"
          fi

          # --- xiaof SSE event-order invariants: stream_to_sse_frames ---
          if git diff "$BASE" "$HEAD" -- forge_xiaof.py | grep -q 'stream_to_sse_frames\|seen_meta\|seen_chips\|seen_done'; then
            add_warn "xiaof SSE event-order code touched — confirm meta → token* → chips → done ordering is still enforced."
          fi

          # --- forge restart race regression: bin/forge stop/start ---
          if git diff "$BASE" "$HEAD" -- bin/forge | grep -qE '^\+.*sleep (0\.5|1)\b'; then
            add_warn "bin/forge: hopeful 'sleep 0.5'/'sleep 1' reintroduced. Use wait_port_free/wait_port_listening (judy PR #42 race fix)."
          fi
          if git diff "$BASE" "$HEAD" -- bin/forge | grep -qE '^-.*wait_port_(free|listening)'; then
            add_finding "bin/forge: wait_port_free/listening removed — would re-open the EADDRINUSE race that killed prod on 2026-05-28."
          fi

          # --- 'needs human' paths ---
          changed="${{ steps.base.outputs.files }}"
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              server.py)               add_human "\`$f\` (HTTP routes / handler — never auto-approve)" ;;
              migrations/*)            add_human "\`$f\` (data migration — never auto-approve)" ;;
              bin/forge)               add_human "\`$f\` (service CLI — review process-lifecycle changes)" ;;
              .github/workflows/*)     add_human "\`$f\` (CI workflow — review for token/permission scope)" ;;
              *.plist|*Library*plist*) add_human "\`$f\` (launchd plist — review KeepAlive/permissions)" ;;
              forge_xiaof.py)          add_human "\`$f\` (xiaof contract — verify A-7.5/7.6 invariants)" ;;
            esac
          done <<< "$changed"

          # Persist outputs for the comment + auto-approve steps.
          has_findings="false"
          has_needs_human="false"
          if printf '%s' "$findings" | grep -q '❌'; then has_findings="true"; fi
          if [ -n "${needs_human// }" ]; then has_needs_human="true"; fi
          {
            echo "findings<<EOF"
            printf '%s' "$findings"
            echo
            echo "EOF"
            echo "needs_human<<EOF"
            printf '%s' "$needs_human"
            echo
            echo "EOF"
            echo "has_findings=$has_findings"
            echo "has_needs_human=$has_needs_human"
          } >> "$GITHUB_OUTPUT"

      - name: Post / update sticky review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          STATS: ${{ steps.base.outputs.stats }}
          FINDINGS: ${{ steps.checks.outputs.findings }}
          NEEDS_HUMAN: ${{ steps.checks.outputs.needs_human }}
          SHA: ${{ steps.base.outputs.head }}
        run: |
          set -euo pipefail
          MARKER='<!-- openforge-bot-review:v1 -->'

          needs_block=""
          if [ -n "${NEEDS_HUMAN// }" ]; then
            needs_block=$'\n**Needs human review** — these paths are not eligible for future auto-approve:\n'"${NEEDS_HUMAN}"
          fi

          # Build body with printf to dodge YAML's literal-block indentation
          # rules (heredocs whose inner lines start at column 1 break the
          # `run: |` parser).
          body=$(printf '%s\n### \xf0\x9f\xa4\x96 bot-review (comment-only \xc2\xb7 phase 1)\n\n**Diff:** `%s` @ `%s`\n\n**Red-line checks:**\n%s\n%s\n\n---\n_Phase 2: auto-approve + auto-merge fire only when red-lines are clean, author is internal, and no needs-human path is touched. Block with `no-auto-merge` label or `[no-auto-merge]` in title._\n' \
            "$MARKER" "$STATS" "${SHA:0:7}" "$FINDINGS" "$needs_block")

          # Find an existing sticky comment by marker, edit if present, else create.
          existing=$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -1)

          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${existing}" \
              -f body="$body" >/dev/null
            echo "Updated sticky comment ${existing}"
          else
            gh pr comment "${PR}" --body "$body"
            echo "Created sticky comment on PR ${PR}"
          fi

      - name: Decide auto-approve eligibility
        id: decide
        env:
          INTERNAL: ${{ steps.membership.outputs.internal }}
          HAS_FINDINGS: ${{ steps.checks.outputs.has_findings }}
          HAS_NEEDS_HUMAN: ${{ steps.checks.outputs.has_needs_human }}
          LABELS: ${{ toJson(github.event.pull_request.labels) }}
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -e
          eligible="true"
          reason=""
          if [ "$INTERNAL" != "true" ];      then eligible="false"; reason="author not internal SymbolStar member"; fi
          if [ "$HAS_FINDINGS" = "true" ];   then eligible="false"; reason="red-line ❌ findings present"; fi
          if [ "$HAS_NEEDS_HUMAN" = "true" ];then eligible="false"; reason="changed paths require human review"; fi
          if echo "$LABELS" | grep -q '"no-auto-merge"'; then eligible="false"; reason="no-auto-merge label set"; fi
          case "$TITLE" in *"[no-auto-merge]"*) eligible="false"; reason="[no-auto-merge] in title";; esac
          echo "eligible=$eligible" >> "$GITHUB_OUTPUT"
          echo "reason=$reason"   >> "$GITHUB_OUTPUT"
          echo "decision: eligible=$eligible reason='$reason'"

      - name: Auto-approve + enable auto-merge
        if: steps.decide.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          echo "Approving PR #${PR} on behalf of github-actions[bot]…"
          gh pr review "$PR" --repo "$REPO" --approve \
            --body "✅ Auto-approved by bot-review: red-line checks clean, internal author, no needs-human paths."
          echo "Enabling auto-merge (squash)…"
          if ! gh pr merge "$PR" --repo "$REPO" --auto --squash; then
            echo "::warning::auto-merge enable failed — repo may not have 'Allow auto-merge' enabled, or no required checks set. Falling back to direct squash merge."
            gh pr merge "$PR" --repo "$REPO" --squash --delete-branch || true
          fi
