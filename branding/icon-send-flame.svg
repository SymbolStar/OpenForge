<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" aria-label="发送">
  <title>OpenForge · 发送（动态火苗）</title>
  <desc>火苗 SVG。SMIL 动画在 prefers-reduced-motion:reduce 时由内置 CSS 暂停，渲染稳定的静态帧。</desc>
  <defs>
    <linearGradient id="flameBody" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0"    stop-color="#FFE9B0"/>
      <stop offset="0.30" stop-color="#FF8A2A"/>
      <stop offset="0.70" stop-color="#FF5A1F"/>
      <stop offset="1"    stop-color="#FFD27A" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="flameCore" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0"    stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#FFE08A"/>
      <stop offset="1"    stop-color="#FF8A2A" stop-opacity="0"/>
    </linearGradient>
    <style><![CDATA[
      /* reduce-motion 降级：暂停所有 SMIL + 复位变换 */
      @media (prefers-reduced-motion: reduce) {
        .anim { animation: none !important; }
        animate, animateTransform { display: none; }
      }
    ]]></style>
  </defs>

  <g transform-origin="12 19" class="flame">
    <!-- 外焰 -->
    <path d="M12 2.5
             C 7.0 8.5, 5.5 12.0, 7.0 16.0
             C 8.2 19.0, 9.8 20.5, 12 21
             C 14.2 20.5, 15.8 19.0, 17.0 16.0
             C 18.5 12.0, 17.0 8.5, 12 2.5 Z"
          fill="url(#flameBody)">
      <animateTransform attributeName="transform" type="scale"
                        values="1 1; 1.03 1.08; 0.97 0.95; 1.04 1.07; 1 1"
                        keyTimes="0;0.25;0.5;0.75;1"
                        dur="1.4s" repeatCount="indefinite"
                        additive="sum"/>
      <animate attributeName="opacity"
               values="0.94;1;0.9;1;0.94"
               keyTimes="0;0.25;0.5;0.75;1"
               dur="1.4s" repeatCount="indefinite"/>
    </path>

    <!-- 内焰 -->
    <path d="M12 7
             C 9.4 11.0, 8.8 13.6, 10.0 16.5
             C 10.6 18.0, 11.2 18.6, 12 18.8
             C 12.8 18.6, 13.4 18.0, 14.0 16.5
             C 15.2 13.6, 14.6 11.0, 12 7 Z"
          fill="url(#flameCore)">
      <animateTransform attributeName="transform" type="scale"
                        values="1 1; 1.08 1.15; 0.92 0.88; 1.06 1.12; 1 1"
                        keyTimes="0;0.2;0.5;0.75;1"
                        dur="0.9s" repeatCount="indefinite"
                        additive="sum"/>
      <animate attributeName="opacity"
               values="0.85;1;0.7;1;0.85"
               keyTimes="0;0.2;0.5;0.75;1"
               dur="0.9s" repeatCount="indefinite"/>
    </path>

    <!-- 白热心 -->
    <ellipse cx="12" cy="16.6" rx="1.2" ry="2.2" fill="#FFFFFF" opacity="0.9">
      <animate attributeName="ry"
               values="2.0;2.4;1.8;2.4;2.0"
               keyTimes="0;0.25;0.5;0.75;1"
               dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity"
               values="0.75;1;0.6;1;0.75"
               keyTimes="0;0.25;0.5;0.75;1"
               dur="0.7s" repeatCount="indefinite"/>
    </ellipse>
  </g>
</svg>
