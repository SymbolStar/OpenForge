<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Forge Pipeline — dual track relay -->
  <rect width="256" height="256" fill="#0E0F11"/>

  <defs>
    <radialGradient id="ember" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#FF6B35" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>

    <symbol id="forgePipeline" viewBox="0 0 256 256">
      <!-- left entry hint: short dashed openings -->
      <path d="M16 96 L40 96" stroke="#F5F5F4" stroke-width="1.5" stroke-dasharray="2 4" opacity="0.55"/>
      <path d="M16 160 L40 160" stroke="#F5F5F4" stroke-width="1.5" stroke-dasharray="2 4" opacity="0.55"/>

      <!-- upper track -->
      <line x1="40" y1="96" x2="196" y2="96" stroke="#F5F5F4" stroke-width="1.75" stroke-linecap="round"/>
      <!-- lower track -->
      <line x1="40" y1="160" x2="196" y2="160" stroke="#F5F5F4" stroke-width="1.75" stroke-linecap="round"/>

      <!-- converge into ember -->
      <line x1="196" y1="96" x2="216" y2="128" stroke="#F5F5F4" stroke-width="1.75" stroke-linecap="round"/>
      <line x1="196" y1="160" x2="216" y2="128" stroke="#F5F5F4" stroke-width="1.75" stroke-linecap="round"/>

      <!-- agent stations: 3 per track, evenly spaced -->
      <!-- upper -->
      <rect x="60"  y="88"  width="16" height="16" fill="#F5F5F4"/>
      <rect x="112" y="88"  width="16" height="16" fill="#F5F5F4"/>
      <rect x="164" y="88"  width="16" height="16" fill="#F5F5F4"/>
      <!-- lower -->
      <rect x="60"  y="152" width="16" height="16" fill="#F5F5F4"/>
      <rect x="112" y="152" width="16" height="16" fill="#F5F5F4"/>
      <rect x="164" y="152" width="16" height="16" fill="#F5F5F4"/>

      <!-- ember glow + core -->
      <circle cx="220" cy="128" r="32" fill="url(#ember)"/>
      <circle cx="220" cy="128" r="12" fill="#FF6B35"/>
    </symbol>
  </defs>

  <!-- main artwork -->
  <use href="#forgePipeline" x="0" y="0" width="256" height="256"/>

  <!-- 16x16 mini preview, bottom-right, 1px stroke frame -->
  <g transform="translate(232 232)">
    <rect x="-0.5" y="-0.5" width="17" height="17" fill="none" stroke="#F5F5F4" stroke-width="1" opacity="0.7"/>
    <use href="#forgePipeline" x="0" y="0" width="16" height="16"/>
  </g>
</svg>
