<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="none" aria-label="发送">
  <title>OpenForge · 发送（火苗 sm 变体，≤28px）</title>
  <!-- sm 变体规则（MEMORY 落定）：
       1) 去渐变 / 去多色装饰，保留主轮廓 + 单一暖芯，避免 16px 糊成一团；
       2) 主轮廓加粗到对齐 16px 像素栅格（线宽 1.5–2px 等效）；
       3) 不带 SMIL — 小尺寸抖动反而干扰；动效统一在 24px+ 主图体现。 -->
  <path d="M8 1.5
           C 4.5 5.6, 3.5 8.2, 4.5 11.0
           C 5.3 13.2, 6.5 14.2, 8 14.5
           C 9.5 14.2, 10.7 13.2, 11.5 11.0
           C 12.5 8.2, 11.5 5.6, 8 1.5 Z"
        fill="#FF6B2C"/>
  <path d="M8 5.0
           C 6.3 7.7, 5.9 9.5, 6.6 11.4
           C 7.0 12.4, 7.5 12.8, 8 12.9
           C 8.5 12.8, 9.0 12.4, 9.4 11.4
           C 10.1 9.5, 9.7 7.7, 8 5.0 Z"
        fill="#FFC36A"/>
</svg>
