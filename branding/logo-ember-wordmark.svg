<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200">
  <title>OpenForge — Ember Forge Wordmark</title>
  <rect width="720" height="200" rx="20" fill="#0E0F11"/>
  <!-- icon (square ember) -->
  <g transform="translate(28,28)">
    <rect x="0" y="0" width="144" height="144" rx="24" fill="#0E0F11" stroke="#F5F5F4" stroke-width="0"/>
    <rect x="8" y="8" width="128" height="128" rx="20" fill="none" stroke="#F5F5F4" stroke-width="7"/>
    <g fill="#F5F5F4">
      <rect x="57" y="20" width="28" height="28" rx="5.5" transform="rotate(12 71 34)"/>
      <rect x="22" y="76" width="28" height="28" rx="5.5" transform="rotate(-18 36 90)"/>
      <rect x="94" y="76" width="28" height="28" rx="5.5" transform="rotate(22 108 90)"/>
    </g>
    <circle cx="72" cy="72" r="20" fill="#FF6B35" opacity="0.22"/>
    <circle cx="72" cy="72" r="11" fill="#FF6B35"/>
    <circle cx="72" cy="72" r="4.5" fill="#FFD8B0"/>
  </g>
  <!-- wordmark -->
  <g font-family="Inter, -apple-system, 'Segoe UI', sans-serif" font-weight="600" fill="#F5F5F4">
    <text x="208" y="118" font-size="68" letter-spacing="-2">
      <tspan>Open</tspan><tspan fill="#FF6B35">Forge</tspan>
    </text>
    <text x="210" y="150" font-size="16" fill="#9CA3AF" letter-spacing="2" font-weight="400">
      THREAD-SHAPED · AGENT-NATIVE
    </text>
  </g>
</svg>
